version: "3.9"

services:
  web:
    build: .
    env_file: .env
    ports:
      - "8009:8009"
    volumes:
      - output_data:/app/output_onderlegger
      - template_data:/app/templates
      - user_data:/app/data
    restart: unless-stopped
    depends_on:
      - db

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-snw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-snw_secret}
      POSTGRES_DB: ${POSTGRES_DB:-snw}
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  output_data:
  template_data:
  user_data:
  pg_data:
